name: Build NixOS for Switch Lite

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm  # native aarch64 – no QEMU needed
    timeout-minutes: 360

    permissions:
      contents: write  # needed to create GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up swap space
        run: |
          # Runner may already have a swapfile; extend it or create a new one
          if [ -f /swapfile ]; then
            sudo swapoff /swapfile 2>/dev/null || true
            sudo rm -f /swapfile
          fi
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14
        with:
          extra-conf: |
            extra-experimental-features = nix-command flakes
            max-jobs = 4
            cores = 4

      - name: Build kernel + NixOS system
        run: |
          set -o pipefail
          nix build \
            .#nixosConfigurations.switch-lite.config.system.build.toplevel \
            --no-link \
            --print-out-paths \
            --log-format raw \
            -v \
            2>&1 | tee build.log

          # Also build the standalone kernel output (contains uImage + DTBs)
          nix build \
            .#packages.aarch64-linux.kernel \
            --out-link result-kernel \
            --log-format raw \
            -v \
            2>&1 | tee kernel-build.log

      - name: Assemble L4T bootstack
        run: |
          set -e
          mkdir -p bootstack-out

          # bl31 (ATF) and bl33 (U-Boot) – vendored in repo
          cp bootstack/bl31.bin bootstack-out/bl31.bin
          cp bootstack/bl33.bin bootstack-out/bl33.bin
          cp bootstack/boot.scr bootstack-out/boot.scr

          # uImage – our kernel, already mkimage-wrapped by the build
          cp result-kernel/boot/uImage bootstack-out/uImage

          # nx-plat.dtimg – DTB image for all Switch variants
          # Order and rev must match what U-Boot/hekate expects (matching Switchroot's layout)
          python3 bootstack/mkdtboimg.py create bootstack-out/nx-plat.dtimg \
            --page_size=4096 \
            result-kernel/boot/tegra210-odin.dtb    --id=0x4F44494E --rev=0x00000000 \
            result-kernel/boot/tegra210b01-odin.dtb --id=0x4F44494E --rev=0x00000b01 \
            result-kernel/boot/tegra210b01-vali.dtb --id=0x56414C49 --rev=0x00000000 \
            result-kernel/boot/tegra210b01-fric.dtb --id=0x46524947 --rev=0x00000000

          # initramfs – NixOS initrd wrapped with mkimage for U-Boot
          TOPLEVEL=$(nix build .#nixosConfigurations.switch-lite.config.system.build.toplevel --no-link --print-out-paths)
          INITRD=$(readlink -f "$TOPLEVEL/initrd")
          echo "Using initrd: $INITRD ($(du -h "$INITRD" | cut -f1))"

          nix shell nixpkgs#ubootTools -c mkimage \
            -A arm64 -O linux -T ramdisk -C gzip \
            -n "NixOS initrd" \
            -d "$INITRD" \
            bootstack-out/initramfs

          ls -lh bootstack-out/

      - name: Build NixOS root tarball
        run: |
          set -e
          mkdir -p release-assets

          # Copy bootstack files into release assets
          cp -r bootstack-out/* release-assets/

          # Raw Image for NixOS internals
          cp result-kernel/Image release-assets/Image

          # Also copy individual DTBs for reference
          for dtb in tegra210b01-vali tegra210b01-fric tegra210-odin tegra210b01-odin; do
            f="result-kernel/boot/${dtb}.dtb"
            [ -f "$f" ] && cp "$f" "release-assets/${dtb}.dtb"
          done

          # hekate boot entry
          cat > release-assets/hekate_ipl.ini.snippet <<'EOF'
          [NixOS]
          l4t=1
          boot_prefixes=/switchroot/nixos/
          rootdev=mmcblk0p2
          rootfstype=ext4
          icon=bootloader/res/icon_payload.bmp
          EOF

          # Resolve toplevel
          TOPLEVEL=$(nix build \
            .#nixosConfigurations.switch-lite.config.system.build.toplevel \
            --no-link \
            --print-out-paths)

          echo "Toplevel: $TOPLEVEL"

          # Collect the full closure
          nix-store --query --requisites "$TOPLEVEL" > /tmp/closure-paths.txt
          echo "Store paths: $(wc -l < /tmp/closure-paths.txt)"

          # Build rootfs into a staging directory, then tar it
          echo "Assembling rootfs…"
          ROOTFS=$(mktemp -d)

          # Copy the full Nix store closure
          sudo xargs -a /tmp/closure-paths.txt cp -a --parents -t "$ROOTFS"

          # Fix root dir ownership (cp --parents may inherit runner UID)
          sudo chown root:root "$ROOTFS"
          sudo chmod 755 "$ROOTFS"

          # Root-level symlinks required to boot NixOS
          sudo ln -sf "$TOPLEVEL/init"  "$ROOTFS/init"
          sudo mkdir -p "$ROOTFS/nix/var/nix/profiles"
          sudo ln -sf "$TOPLEVEL"       "$ROOTFS/nix/var/nix/profiles/system"

          # /var/empty must exist for nsncd
          sudo mkdir -p "$ROOTFS/var/empty"
          sudo chmod 555 "$ROOTFS/var/empty"

          echo "Creating rootfs tarball…"
          sudo tar \
            --create \
            --zstd \
            --file release-assets/nixos-rootfs.tar.zst \
            -C "$ROOTFS" \
            --numeric-owner \
            .

          ls -lh release-assets/nixos-rootfs.tar.zst

          # Split if >1900 MB (GitHub 2 GB per-file limit)
          SIZE=$(stat -c%s release-assets/nixos-rootfs.tar.zst)
          if [ "$SIZE" -gt $((1900 * 1024 * 1024)) ]; then
            echo "Rootfs is >1900 MB, splitting…"
            split -b 1900m release-assets/nixos-rootfs.tar.zst release-assets/nixos-rootfs.tar.zst.part
            rm release-assets/nixos-rootfs.tar.zst
            ls -lh release-assets/nixos-rootfs.tar.zst.part*
          fi

          ls -lh release-assets/

      - name: Collect full nix derivation logs on failure
        if: failure()
        run: |
          for log in build.log kernel-build.log; do
            [ -f "$log" ] || continue
            grep -oP '/nix/store/[a-z0-9]+-[^'\'']+\.drv' "$log" | sort -u | while read drv; do
              outfile="nix-drv-logs/$(basename "$drv").log"
              mkdir -p nix-drv-logs
              echo "=== $drv ===" > "$outfile"
              nix log "$drv" >> "$outfile" 2>&1 || true
            done
          done

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
            kernel-build.log
            nix-drv-logs/
          retention-days: 7

      - name: Upload artifacts (PR builds)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: switch-nixos
          path: release-assets/
          retention-days: 30

      - name: Create GitHub Release (push to main/master)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "NixOS Switch Lite – build #${{ github.run_number }}"
          body: |
            Automated build from commit ${{ github.sha }}.

            ## Files

            | File | Purpose |
            |---|---|
            | `uImage` | Kernel (U-Boot wrapped) |
            | `initramfs` | NixOS initrd (U-Boot wrapped) |
            | `nx-plat.dtimg` | DTB image for all Switch variants |
            | `bl31.bin` | ARM Trusted Firmware |
            | `bl33.bin` | U-Boot |
            | `boot.scr` | U-Boot boot script |
            | `Image` | Raw kernel (for NixOS internals) |
            | `nixos-rootfs.tar.zst` / `.tar.zst.part*` | Full NixOS root closure |
            | `hekate_ipl.ini.snippet` | Add to `hekate_ipl.ini` |

            ## Flashing (on your PC)

            ```bash
            sudo mount /dev/sdXp1 /mnt/fat32
            sudo mount /dev/sdXp2 /mnt/nixos

            # Copy bootstack to FAT32
            sudo mkdir -p /mnt/fat32/switchroot/nixos
            sudo cp uImage initramfs nx-plat.dtimg bl31.bin bl33.bin boot.scr /mnt/fat32/switchroot/nixos/

            # Copy hekate ini
            sudo cp hekate_ipl.ini.snippet /mnt/fat32/bootloader/ini/nixos.ini

            # Extract NixOS rootfs
            cat nixos-rootfs.tar.zst.part* | sudo tar --zstd -xf - -C /mnt/nixos --numeric-owner
            # or if single file:
            # sudo tar --zstd -xf nixos-rootfs.tar.zst -C /mnt/nixos --numeric-owner

            sudo umount /mnt/fat32 /mnt/nixos
            ```
          files: release-assets/*
          fail_on_unmatched_files: true
