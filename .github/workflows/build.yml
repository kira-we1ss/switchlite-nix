name: Build NixOS for Switch Lite

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm  # native aarch64 – no QEMU needed
    timeout-minutes: 360

    permissions:
      contents: write  # needed to create GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14
        with:
          extra-conf: |
            extra-experimental-features = nix-command flakes

      - name: Build kernel + NixOS system
        run: |
          set -o pipefail
          nix build \
            .#nixosConfigurations.switch-lite.config.system.build.toplevel \
            --no-link \
            --print-out-paths \
            --log-format raw \
            -v \
            2>&1 | tee build.log

          # Also build the standalone kernel output (contains uImage + DTBs)
          nix build \
            .#packages.aarch64-linux.kernel \
            --out-link result-kernel \
            --log-format raw \
            -v \
            2>&1 | tee kernel-build.log

      - name: Collect boot files
        run: |
          mkdir -p release-assets

          # Raw Image (required by hekate)
          cp result-kernel/Image release-assets/Image

          # uImage (U-Boot wrapped, kept for reference)
          cp result-kernel/boot/uImage release-assets/uImage

          # DTBs – copy all that exist
          for dtb in \
              tegra210b01-vali \
              tegra210b01-fric \
              tegra210-odin \
              tegra210b01-odin; do
            f="result-kernel/boot/${dtb}.dtb"
            [ -f "$f" ] && cp "$f" "release-assets/${dtb}.dtb" && echo "Copied ${dtb}.dtb"
          done

          # hekate boot entry snippet for convenience
          cat > release-assets/hekate_ipl.ini.snippet <<'EOF'
          [NixOS]
          l4t=1
          boot_prefixes=/switchroot/ubuntu/
          id=nixos
          rootdev=mmcblk0p2
          rootfstype=ext4
          icon=bootloader/res/icon_payload.bmp
          EOF

          ls -lh release-assets/

      - name: Build NixOS root tarball
        run: |
          # Resolve the toplevel store path
          TOPLEVEL=$(nix build \
            .#nixosConfigurations.switch-lite.config.system.build.toplevel \
            --no-link \
            --print-out-paths)

          echo "Toplevel: $TOPLEVEL"

          # Collect the full closure into a list of store paths
          nix-store --query --requisites "$TOPLEVEL" > /tmp/closure-paths.txt
          wc -l /tmp/closure-paths.txt

          # Pack as a tar.zst – exclude nix-support dirs and unnecessary docs
          echo "Creating rootfs tarball…"
          sudo tar \
            --create \
            --zstd \
            --file release-assets/nixos-rootfs.tar.zst \
            --files-from /tmp/closure-paths.txt \
            --transform 's|^/||' \
            --numeric-owner

          ls -lh release-assets/nixos-rootfs.tar.zst

          # GitHub releases have a 2 GB per-file limit.
          # Split into 1900 MB chunks (named .tar.zst.part00, .part01, …)
          SIZE=$(stat -c%s release-assets/nixos-rootfs.tar.zst)
          if [ "$SIZE" -gt $((1900 * 1024 * 1024)) ]; then
            echo "Rootfs is >1900 MB, splitting into chunks…"
            split -b 1900m release-assets/nixos-rootfs.tar.zst release-assets/nixos-rootfs.tar.zst.part
            rm release-assets/nixos-rootfs.tar.zst
            ls -lh release-assets/nixos-rootfs.tar.zst.part*
          fi

      - name: Collect full nix derivation logs on failure
        if: failure()
        run: |
          # Extract failed .drv paths from build output and dump their full logs
          for log in build.log kernel-build.log; do
            [ -f "$log" ] || continue
            grep -oP '/nix/store/[a-z0-9]+-[^'\'']+\.drv' "$log" | sort -u | while read drv; do
              outfile="nix-drv-logs/$(basename "$drv").log"
              mkdir -p nix-drv-logs
              echo "=== $drv ===" > "$outfile"
              nix log "$drv" >> "$outfile" 2>&1 || true
            done
          done

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
            kernel-build.log
            nix-drv-logs/
          retention-days: 7

      - name: Upload artifacts (PR builds)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: switch-nixos
          path: release-assets/
          retention-days: 30

      - name: Create GitHub Release (push to main/master)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "NixOS Switch Lite – build #${{ github.run_number }}"
          body: |
            Automated build from commit ${{ github.sha }}.

            ## Prerequisites

            This NixOS build requires the **Switchroot L4T Ubuntu bootstack** to already be installed on your SD card.
            The bootstack provides `bl31.bin`, `bl33.bin` (U-Boot), and associated firmware that hekate needs to boot Linux.
            See the [README](https://github.com/kira-we1ss/switchlite-nix#readme) for the full installation guide.

            ## Files

            | File | Purpose |
            |---|---|
            | `uImage` | Kernel image – replaces `switchroot/ubuntu/uImage` |
            | `Image` | Raw uncompressed kernel (for NixOS internals) |
            | `tegra210b01-vali.dtb` | DTB for Switch Lite (HDH-001) |
            | `tegra210b01-fric.dtb` | DTB for Switch Lite (fric fuse variant) |
            | `tegra210-odin.dtb` | DTB for OG Switch |
            | `tegra210b01-odin.dtb` | DTB for OG Switch (Mariko revision) |
            | `nixos-rootfs.tar.zst` / `.tar.zst.part*` | Full NixOS root closure – extract to ext4 partition (reassemble parts first if split) |
            | `hekate_ipl.ini.snippet` | Add to `hekate_ipl.ini` on the FAT32 partition |

            ## Flashing (on your PC)

            ```bash
            # Mount SD card partitions (adjust /dev/sdX to your card)
            sudo mount /dev/sdXp1 /mnt/fat32
            sudo mount /dev/sdXp2 /mnt/nixos

            # Replace kernel (bootstack must already be installed by Switchroot L4T Ubuntu)
            sudo cp uImage /mnt/fat32/switchroot/ubuntu/uImage

            # NixOS rootfs – if split into parts, reassemble then extract:
            cat nixos-rootfs.tar.zst.part* | sudo tar --zstd -xf - -C /mnt/nixos --numeric-owner
            # If a single file:
            # sudo tar --zstd -xf nixos-rootfs.tar.zst -C /mnt/nixos --numeric-owner

            sudo umount /mnt/fat32 /mnt/nixos
            ```
          files: release-assets/*
          fail_on_unmatched_files: true
